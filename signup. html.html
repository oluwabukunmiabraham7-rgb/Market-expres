<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Enitan Collection</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--jumia-gray); padding: 20px;">

    <div class="admin-card" style="width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 8px; box-shadow: var(--shadow);">
        <div style="text-align: center; margin-bottom: 25px;">
            <a href="index.html" class="logo" style="font-size: 2.2rem;">ENITAN🎇 COLLECTIONS<span>.</span></a>
            <h3 style="margin-top: 10px; color: var(--jumia-dark);">Create your account</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Join the collection today A.S.A.P</p>
        </div>

        <form id="signupForm">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem;">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your first and last name" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; outline-color: var(--jumia-orange);" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem;">Email Address</label>
                <input type="email" id="email" placeholder="example@mail.com" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; outline-color: var(--jumia-orange);" required>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem;">Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; outline-color: var(--jumia-orange);" required>
            </div>

            <button type="submit" class="btn-add" style="width: 100%; padding: 14px; font-size: 1rem;">CREATE🎇 ACCOUNT</button>
        </form>

        <div style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: var(--jumia-orange); font-weight: bold; text-decoration: none;">Login here</a>
        </div>
    </div>

    <script type="module">
        import { auth, createUserWithEmailAndPassword, db, doc, serverTimestamp } from './firebase.js';
        import { setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                // 1. Create User in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Save Additional User Info in Firestore
                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    role: "customer", // Default role
                    createdAt: serverTimestamp()
                });

                alert("Account created successfully!");
                window.location.href = "index.html";
            } catch (error) {
                let errorMessage = "An error occurred during signup.";
                if (error.code === 'auth/email-already-in-use') errorMessage = "This email is already registered.";
                if (error.code === 'auth/weak-password') errorMessage = "Password should be at least 6 characters.";
                
                alert(errorMessage);
                console.error(error);
            }
        };
    </script>
</body>
</html>
