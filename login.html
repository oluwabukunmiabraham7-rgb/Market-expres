<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Enitan Collection</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #f5f5f5;">
    <div class="admin-card" style="width: 400px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="index.html" class="logo">ENITAN<span>.</span></a>
            <h3 style="margin-top: 10px;">Welcome Back</h3>
        </div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Address" style="width:100%; padding:12px; margin-bottom:15px; border: 1px solid #ccc;" required>
            <input type="password" id="password" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; border: 1px solid #ccc;" required>
            <button type="submit" class="btn-add">LOGIN</button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
            Don't have an account? <a href="signup.html" style="color: var(--jumia-orange);">Sign Up</a>
        </p>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from './firebase.js';
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, email.value, password.value);
                window.location.href = 'index.html';
            } catch (err) {
                alert("Login failed: " + err.message);
            }
        };
    </script>
</body>
</html>
